<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
    <style>
        /* 1. Global Reset & Typography */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a; /* Dark Slate */
            color: #e2e8f0; /* Off-white text */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 2. Main Container Card */
        body > *:not(script) {
            /* This targets a wrapper if you had one, but here we style the body flow */
            width: 100%;
            max-width: 450px;
            background: #1e293b; /* Lighter slate */
            padding: 3rem 2rem;
            border-radius: 24px;
            box-shadow:
                    0 20px 25px -5px rgba(0, 0, 0, 0.4),
                    0 10px 10px -5px rgba(0, 0, 0, 0.3);
            text-align: center;
            border: 1px solid #334155;
        }

        /* 3. Headers */
        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            /* Gradient Text Effect */
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        p {
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 2.5rem;
        }

        /* 4. The List */
        ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 16px; /* Space between items */
        }

        /* 5. The Links (Buttons) */
        a {
            display: block;
            text-decoration: none;
            color: #f8fafc;
            background-color: #334155;
            padding: 1.2rem;
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
            position: relative;
            overflow: hidden;
        }

        /* 6. Hover Effects */
        a:hover {
            background-color: #475569;
            transform: translateY(-3px);
            border-color: #818cf8;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        a:active {
            transform: translateY(0);
        }

        /* Optional: Add a subtle arrow to the links */
        a::after {
            content: "→";
            position: absolute;
            right: 20px;
            opacity: 0;
            transition: all 0.3s ease;
            transform: translateX(-10px);
        }

        a:hover::after {
            opacity: 1;
            transform: translateX(0);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>My Home Page</h1>
    <p>Tutorials</p>
    <ul>
        <li>
            <a href="/"> How to do tax evasion </a>
        </li>
        <li>
            <a href="/"> Money Laundering 101 </a>
        </li>
        <li>
            <a href="/"> Invest in rare fish </a>
        </li>
    </ul>
</div>

</body>
</html>
